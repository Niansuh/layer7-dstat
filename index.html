<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layer7 - DSTAT Dashboard</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background-color: #f5f5f5;
      }
      #container {
        width: 90%;
        max-width: 1200px;
        margin: 20px;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      #chart {
        width: 100%;
        margin: 20px 0;
      }
      #info {
        text-align: center;
        margin-bottom: 20px;
      }
      #stats {
        display: flex;
        justify-content: space-around;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .stat-box {
        background: #f0f0f0;
        padding: 10px 20px;
        border-radius: 5px;
        margin: 5px;
      }
      .alert {
        color: red;
        font-weight: bold;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1 id="info">Layer7 DSTAT Dashboard</h1>
      <p>Capturing requests from <code>/dstat</code></p>
      <div id="stats">
        <div class="stat-box">Requests: <span id="reqs">0</span></div>
        <div class="stat-box">Connections: <span id="conns">0</span></div>
        <div class="stat-box">CPU: <span id="cpu">0</span>%</div>
        <div class="stat-box">Memory: <span id="memory">0</span>%</div>
      </div>
      <div id="alert" class="alert"></div>
      <div id="chart"></div>
    </div>

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const chart = Highcharts.chart("chart", {
          exporting: { enabled: true },
          chart: { type: "area" },
          title: { text: "Real-Time Metrics" },
          xAxis: { type: "datetime" },
          yAxis: { title: { text: "" } },
          series: [
            { name: "Requests", data: [] },
            { name: "Connections", data: [] },
            { name: "CPU Usage (%)", data: [] },
            { name: "Memory Usage (%)", data: [] }
          ]
        });

        const ws = new WebSocket(
          (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/"
        );

        ws.onmessage = (event) => {
          const { requests, connections, cpu, memory, alert } = JSON.parse(event.data);
          const time = Date.now();

          // Update chart
          chart.series[0].addPoint([time, requests], true, chart.series[0].points.length > 60);
          chart.series[1].addPoint([time, connections], true, chart.series[1].points.length > 60);
          chart.series[2].addPoint([time, cpu], true, chart.series[2].points.length > 60);
          chart.series[3].addPoint([time, parseFloat(memory)], true, chart.series[3].points.length > 60);

          // Update stats
          document.getElementById("reqs").textContent = requests;
          document.getElementById("conns").textContent = connections;
          document.getElementById("cpu").textContent = cpu.toFixed(2);
          document.getElementById("memory").textContent = memory;

          // Update alert
          const alertElement = document.getElementById("alert");
          alertElement.textContent = alert || "";
        };
      });
    </script>
  </body>
</html>
